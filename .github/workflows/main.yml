name: Build Spider Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace

      # Собираем файлы и добавляем "|| true", чтобы шаг не падал, если папка пуста
      - name: Collect All Jar Files
        run: |
          mkdir -p final_output
          find . -name "*.jar" ! -name "*original*" -exec cp {} final_output/ \; || true
          ls -l final_output || true

      # Загружаем всё, что удалось найти
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Spider-Plugin
          path: final_output/
          if-no-files-found: ignore
