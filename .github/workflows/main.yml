name: Build Spider Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace

      # Ищем вообще любые .jar файлы, которые создал компилятор в проекте
      - name: Collect All Jar Files
        run: |
          mkdir -p final_output
          find . -name "*.jar" ! -name "*original*" ! -path "*/.gradle/*" -exec cp {} final_output/ \;
          ls -l final_output

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Spider-Plugin
          path: final_output/
