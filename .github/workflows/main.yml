name: Build Spider Plugin

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant chmod execution permission
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build --no-daemon --stacktrace

      - name: Deploy to MCServerHost via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          local_path: 'build/libs/*' # Звёздочка указывает, что нужно брать сами файлы внутри папки
          remote_path: '/plugins'
          sftp_only: true # Принудительно работать строго по SFTP (критично для Pterodactyl-панелей)
          delete_remote_files: false
